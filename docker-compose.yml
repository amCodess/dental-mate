services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dental_mate_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dental_mate
      - DB_USERNAME=dental_user
      - DB_PASSWORD=secret
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dental_mate_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: dental_mate_db
    environment:
      - POSTGRES_DB=dental_mate
      - POSTGRES_USER=dental_user
      - POSTGRES_PASSWORD=secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount initialization script if needed. 
      # Since we have backend/database/init_database.sql, we can mount it to run on first setup.
      # However, users usually run migrations manually or via script. 
      # Let's map it but let user invoke it if needed or let it auto-run if empty.
      #- ./backend/database/init_database.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    container_name: dental_mate_adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db

volumes:
  pgdata:
