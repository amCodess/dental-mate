services:
  # Backend App (Laravel/PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: dental_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    networks:
      - dental-network
    depends_on:
      - db

  # Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: dental_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dental-network
    depends_on:
      - app

  # Frontend (React/Vite)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: dental_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host
    networks:
      - dental-network

  # Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: dental_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-dental_mate}
      POSTGRES_USER: ${DB_USERNAME:-dental_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dental_password}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - dental-network

networks:
  dental-network:
    driver: bridge

volumes:
  db-data:
  frontend_node_modules:
